# roles__functional.yml

roles:
  - name: analyst
  - name: reporter

# Role hierarchy
role_grants:
  - to_role: analyst
    roles:
      - z_db__analytics
      - z_wh__wh_transforming
      - z_schemas__usage__all
      - z_tables_views__select__analytics

  - to_role: reporter
    roles:
      - z_db__analytics
      - z_wh__wh_transforming
      - z_schemas__usage__marts
      - z_tables_views__select__analytics
