# schemas.yml
schemas:
  - name: analytics.staging
  - name: analytics.marts

roles:
  - name: z_schemas__usage__staging
  - name: z_schemas__usage__marts
  - name: z_schemas__usage__all

  - name: z_tables_views__select__analytics

grants:
  - priv: USAGE
    on: schema analytics.staging
    to: z_schemas__usage__staging

  - priv: USAGE
    on: schema analytics.marts
    to: z_schemas__usage__marts

  - priv: USAGE
    on:
      - all schemas in database analytics
      - future schemas in database analytics
    to: z_schemas__usage__all

  - priv: SELECT
    on:
      - all tables in database analytics
      - all views in database analytics
      - future tables in database analytics
      - future views in database analytics
    to: z_tables_views__select__analytics
